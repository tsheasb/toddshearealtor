<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 718" role="img"
     aria-labelledby="mapTitle mapDesc" class="area-map" preserveAspectRatio="xMidYMid meet">
  <title id="mapTitle">Areas Todd Shea serves</title>
  <desc id="mapDesc">Los Olivos, Santa Ynez and Buellton in the Santa Ynez Valley; Goleta,
  Santa Barbara, Montecito, Summerland and Carpinteria on the South Coast; Ojai and Ventura
  in Ventura County.</desc>

  <style>
    .coast { stroke: #85B7EB; stroke-width: 30; stroke-linecap: round; fill: none; opacity: 0.30; }
    .spine { stroke: #161311; stroke-width: 1.5; opacity: 0.14; }
    .pin circle { fill: #D85A30; }
    .pin text {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 21px; font-weight: 700; letter-spacing: 0.07em;
      fill: #161311; text-transform: uppercase;
    }
    .group {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.20em;
      fill: #2968A7; text-transform: uppercase;
    }
  </style>

  <path class="coast" d="M 84 28 C 132 178, 60 318, 120 458 C 176 588, 96 618, 140 688"/>
  <line class="spine" x1="232" y1="40" x2="232" y2="634"/>

    <text class="group" x="198" y="36" text-anchor="end">Santa Ynez Valley</text>
    <g class="pin">
      <circle cx="232" cy="58" r="7"/>
      <text x="262" y="64">Los Olivos</text>
    </g>
    <g class="pin">
      <circle cx="232" cy="120" r="7"/>
      <text x="262" y="126">Santa Ynez</text>
    </g>
    <g class="pin">
      <circle cx="232" cy="182" r="7"/>
      <text x="262" y="188">Buellton</text>
    </g>
    <text class="group" x="198" y="222" text-anchor="end">South Coast</text>
    <g class="pin">
      <circle cx="232" cy="244" r="7"/>
      <text x="262" y="250">Goleta</text>
    </g>
    <g class="pin">
      <circle cx="232" cy="306" r="7"/>
      <text x="262" y="312">Santa Barbara</text>
    </g>
    <g class="pin">
      <circle cx="232" cy="368" r="7"/>
      <text x="262" y="374">Montecito</text>
    </g>
    <g class="pin">
      <circle cx="232" cy="430" r="7"/>
      <text x="262" y="436">Summerland</text>
    </g>
    <g class="pin">
      <circle cx="232" cy="492" r="7"/>
      <text x="262" y="498">Carpinteria</text>
    </g>
    <text class="group" x="198" y="532" text-anchor="end">Ventura County</text>
    <g class="pin">
      <circle cx="232" cy="554" r="7"/>
      <text x="262" y="560">Ojai</text>
    </g>
    <g class="pin">
      <circle cx="232" cy="616" r="7"/>
      <text x="262" y="622">Ventura</text>
    </g>
</svg>