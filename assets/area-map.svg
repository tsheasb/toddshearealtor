<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img"
     aria-labelledby="mapTitle mapDesc" class="area-map" preserveAspectRatio="xMidYMid meet">
  <title id="mapTitle">Areas Todd Shea serves</title>
  <desc id="mapDesc">Stylised locator marking Los Olivos, Buellton, Santa Ynez, Goleta, Santa Barbara,
  Montecito, Summerland, Carpinteria, Ojai and Ventura.</desc>

  <style>
    .sea   { fill: #85B7EB; opacity: 0.18; }
    .coast { stroke: #2968A7; stroke-width: 3; stroke-linecap: round; }
    .pin circle { fill: #D85A30; }
    .pin text {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
      fill: #161311; text-transform: uppercase;
    }
  </style>

  <path class="sea"
        d="M 40 316 C 160 282, 250 262, 340 274
           C 445 288, 535 314, 630 332
           C 735 352, 830 366, 970 356
           L 970 430 L 40 430 Z"/>
  <path class="coast" fill="none"
        d="M 40 316 C 160 282, 250 262, 340 274
           C 445 288, 535 314, 630 332
           C 735 352, 830 366, 970 356"/>

    <g class="pin">
      <circle cx="166.4" cy="80.0" r="6.5"/>
      <text x="166.4" y="58.0" text-anchor="middle">Los Olivos</text>
    </g>
    <g class="pin">
      <circle cx="100.0" cy="118.9" r="6.5"/>
      <text x="100.0" y="150.9" text-anchor="middle">Buellton</text>
    </g>
    <g class="pin">
      <circle cx="193.8" cy="118.9" r="6.5"/>
      <text x="193.8" y="78.9" text-anchor="middle">Santa Ynez</text>
    </g>
    <g class="pin">
      <circle cx="403.7" cy="240.2" r="6.5"/>
      <text x="403.7" y="218.2" text-anchor="middle">Goleta</text>
    </g>
    <g class="pin">
      <circle cx="510.8" cy="250.5" r="6.5"/>
      <text x="510.8" y="282.5" text-anchor="middle">Santa Barbara</text>
    </g>
    <g class="pin">
      <circle cx="565.6" cy="239.5" r="6.5"/>
      <text x="565.6" y="199.5" text-anchor="middle">Montecito</text>
    </g>
    <g class="pin">
      <circle cx="594.6" cy="250.5" r="6.5"/>
      <text x="594.6" y="302.5" text-anchor="middle">Summerland</text>
    </g>
    <g class="pin">
      <circle cx="660.2" cy="265.5" r="6.5"/>
      <text x="660.2" y="297.5" text-anchor="middle">Carpinteria</text>
    </g>
    <g class="pin">
      <circle cx="885.9" cy="232.0" r="6.5"/>
      <text x="885.9" y="210.0" text-anchor="middle">Ojai</text>
    </g>
    <g class="pin">
      <circle cx="900.0" cy="350.0" r="6.5"/>
      <text x="900.0" y="382.0" text-anchor="middle">Ventura</text>
    </g>
</svg>